<!DOCTYPE html>
<html>
<head>
    <title>Music</title>
    <style>
        /* 新增音频播放器样式 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .media-item {
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 12px;
            background: #f8f9fa;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        audio::-webkit-media-controls-panel {
            background: #f1f3f4;
        }
        .file-name {
            margin: 10px 0;
            font-weight: 500;
            color: #2d3436;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #333; margin: 20px 0;">个人自用喵</h1>
    <div class="gallery" id="gallery"></div>

    <script>
        // 配置参数
        const config = {
            userName: '250502520',
            repoName: 'music',
            branch: 'master',
            mediaFolder: 'assets/media'
        };

        // 使用CDN加速路径
        const cdnBase = `https://cdn.jsdelivr.net/gh/${config.userName}/${config.repoName}@${config.branch}/`;
        const mediaPath = `${cdnBase}${config.mediaFolder}/`;
        
        // 优化后的API请求
        const apiUrl = `https://api.github.com/repos/${config.userName}/${config.repoName}/contents/${config.mediaFolder}?ref=${config.branch}&_=${Date.now()}`;

        // 加载音乐文件
        async function loadMedia() {
            const gallery = document.getElementById('gallery');
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`请求失败: ${response.status}`);
                
                const files = await response.json();

                files.forEach(file => {
                    if (isAudioFile(file.name)) {
                        const container = createPlayer(file);
                        gallery.appendChild(container);
                    }
                });

            } catch (error) {
                gallery.innerHTML = `<div style="color: #e74c3c; text-align: center; padding: 20px;">⚠️ 加载失败: ${error.message}</div>`;
                console.error('错误详情:', error);
            }
        }

        // 创建播放器组件
        function createPlayer(file) {
            const container = document.createElement('div');
            container.className = 'media-item';

            // 文件名显示
            const fileName = document.createElement('div');
            fileName.className = 'file-name';
            fileName.textContent = file.name.replace(/\.[^/.]+$/, ""); // 移除扩展名
            container.appendChild(fileName);

            // 音频播放器
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.preload = "metadata";
            
            // 处理特殊字符文件名
            const encodedName = encodeURIComponent(file.name);
            
            // 多格式支持
            const sources = {
                'mp3': 'audio/mpeg',
                'ogg': 'audio/ogg',
                'wav': 'audio/wav'
            };

            Object.entries(sources).forEach(([ext, type]) => {
                const source = document.createElement('source');
                source.src = `${mediaPath}${encodedName}`;
                source.type = type;
                audio.appendChild(source);
            });

            // 错误处理
            audio.onerror = () => {
                container.style.border = '2px solid #e74c3c';
                fileName.innerHTML += '<br><span style="color:#e74c3c">播放失败</span>';
            };

            container.appendChild(audio);
            return container;
        }

        // 文件类型检测
        function isAudioFile(name) {
            return /\.(mp3|wav|ogg)$/i.test(name);
        }

        window.onload = loadMedia;
    </script>
</body>
</html>
